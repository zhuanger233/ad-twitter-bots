services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: twitter_subtitle_bot_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - proxy_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: twitter_subtitle_bot_worker
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    networks:
      - default

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - default

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: subtitle_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

volumes:
  redis_data:
  postgres_data:

networks:
  proxy_net:
    external: true
    name: proxy_network
